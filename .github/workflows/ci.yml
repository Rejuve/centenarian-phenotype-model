name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (from source, with extras)
        run: pip install -e ".[test,api]"
      - name: Run pytest
        run: python -m pytest -q

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Ruff (package + validation harness + tests)
        run: python -m ruff check    # config in pyproject.toml [tool.ruff]

  build:
    name: wheel build + install + import
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build pyyaml
      - name: Deterministic model-artifact check
        run: python scripts/make_manifest.py --check
      - name: Build wheel
        run: python -m build --wheel
      - name: Install the wheel in a clean env and smoke-test bundled data
        run: |
          pip install dist/*.whl
          python - <<'PY'
          import centenarian_phenotype as cp
          # bundled model YAMLs + longevity baselines must travel inside the wheel
          r = cp.score(1, {"q_smoking": 0, "q_family": 0, "q_social": 0})
          assert 0 <= r["score_pct"] <= 100
          assert cp.population_baseline("Japan", sex="F")["p_reach_target"] > 0
          print("wheel OK:", cp.__version__, r["score_pct"])
          PY

  secret-scan:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan tracked files for secrets
        run: |
          # strict, full-length key patterns (won't match the short regex tokens in the hook itself)
          pat='(sk-[A-Za-z0-9]{20,}|s2k-[A-Za-z0-9]{20,}|AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z_-]{30,}|gh[pousr]_[A-Za-z0-9]{36}|xox[baprs]-[A-Za-z0-9-]{20,}|glpat-[A-Za-z0-9_-]{20,}|-----BEGIN [A-Z ]*PRIVATE KEY-----)'
          # exclude files that legitimately contain detection patterns
          files=$(git ls-files | grep -vE '^\.githooks/|^\.pre-commit-config\.yaml$|^\.github/workflows/')
          hits=$(printf '%s\n' "$files" | xargs -d '\n' grep -nIHE "$pat" 2>/dev/null || true)
          if [ -n "$hits" ]; then
            echo "::error::possible secret detected"; echo "$hits"; exit 1
          fi
          echo "No secrets found."
