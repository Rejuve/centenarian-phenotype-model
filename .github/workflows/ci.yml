name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pyyaml "fastapi>=0.110" "uvicorn>=0.27" "httpx>=0.24" "pytest>=7"
      - name: Run pytest
        run: python -m pytest -q

  secret-scan:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan tracked files for secrets
        run: |
          # strict, full-length key patterns (won't match the short regex tokens in the hook itself)
          pat='(sk-[A-Za-z0-9]{20,}|s2k-[A-Za-z0-9]{20,}|AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z_-]{30,}|gh[pousr]_[A-Za-z0-9]{36}|xox[baprs]-[A-Za-z0-9-]{20,}|glpat-[A-Za-z0-9_-]{20,}|-----BEGIN [A-Z ]*PRIVATE KEY-----)'
          # exclude files that legitimately contain detection patterns
          files=$(git ls-files | grep -vE '^\.githooks/|^\.pre-commit-config\.yaml$|^\.github/workflows/')
          hits=$(printf '%s\n' "$files" | xargs -d '\n' grep -nIHE "$pat" 2>/dev/null || true)
          if [ -n "$hits" ]; then
            echo "::error::possible secret detected"; echo "$hits"; exit 1
          fi
          echo "No secrets found."
